name: Bug report
description: Report broken behavior in cognitive-os
labels: [bug]
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and confirmed this is not a duplicate
          required: true
  - type: input
    id: version
    attributes:
      label: cognitive-os version
      placeholder: e.g. 0.2.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: macOS/Linux, Python version, shell
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the exact broken behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Paste command output, logs, stack traces, or screenshots.
    validations:
      required: false
