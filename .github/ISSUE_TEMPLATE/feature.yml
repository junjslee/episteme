name: Feature request
description: Propose a new capability for cognitive-os
labels: [enhancement]
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and confirmed this request is new
          required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem are you solving?
      description: Describe the concrete pain, not just an idea.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, CLI surface, docs, and expected outputs.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: true
  - type: textarea
    id: posture
    attributes:
      label: Epistemic alignment
      description: |
        Answer at least two of the following before submitting:
        - How does this proposal strengthen the agent's cognitive posture?
        - Does this feature violate any of the four kernel principles (Orientation, Loop, Surface, Lenses)?
        - What failure mode does this counter—and is that failure mode already named in FAILURE_MODES.md?
        - Does this belong in the kernel (invariant), the operator profile (preference), or an adapter (delivery)? Why?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List testable, falsifiable conditions for completion.
      placeholder: |
        - [ ] Behavior X is observable in demo output
        - [ ] Kernel invariants remain unbroken (cite the principle)
        - [ ] Disconfirmation condition: what evidence would mean this feature failed?
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Scope and risk
      description: Affected files/areas, migration impact, rollback plan. Note whether this touches the kernel (load-bearing) or an adapter (swappable).
    validations:
      required: true
