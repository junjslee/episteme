name: Feature request
description: Propose a new capability for cognitive-os
labels: [enhancement]
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and confirmed this request is new
          required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem are you solving?
      description: Describe the concrete pain, not just an idea.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, CLI surface, docs, and expected outputs.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List testable conditions for completion.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Scope and risk
      description: Affected files/areas, migration impact, rollback plan.
    validations:
      required: true
