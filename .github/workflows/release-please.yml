name: release-please

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    # Job-level permissions — release-please v4 requires these to be
    # explicit at the job scope (the workflow-level block above was
    # insufficient on 2026-04-23 when the first workflow run failed
    # with "GitHub Actions is not permitted to create or approve pull
    # requests." Operator also enabled the corresponding repo-level
    # setting via GitHub Web UI). Duplicating the block here is idempotent
    # and survives any future refactor that splits this into a multi-job
    # workflow.
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # Uses the default GITHUB_TOKEN with contents:write + pull-requests:write
          # scopes (granted above). No custom PAT needed for the standard flow —
          # release-please opens a release PR; merging it creates the git tag and
          # GitHub release, which bumps pyproject.toml + plugin.json + marketplace.json
          # to the next version derived from conventional-commits in the window since
          # the last release.

      # PyPI publish was deliberately removed (Event 143, PRODUCT_MASTER_PLAN
      # §9.2): the install units are the Claude Code plugin and a source
      # checkout — a pip-installed CLI without core/ has no meaning, so the
      # dead path is deleted rather than left commented where it could be
      # re-enabled by accident. The PyPI name is defended by the stub at
      # packaging/episteme-kernel-stub/ (operator-published, never CI).
