<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" role="img" aria-label="episteme control plane architecture. Agent runtime issues tool calls; the episteme control plane mediates every one via the reasoning-surface guard, the stateful interceptor, and the calibration-telemetry feed before the hardware and operating system observe any effect.">
  <title>episteme — cybernetic control plane</title>
  <desc>Three-layer schematic. Top: agent runtime. Middle: episteme control plane with reasoning-surface guard, stateful interceptor, and calibration telemetry. Bottom: hardware and operating system. Block and pass arrows show the governance decision; the stateful interceptor loop persists file-write memory across calls; the telemetry feed pairs predictions with observed exit codes.</desc>

  <defs>
    <style type="text/css"><![CDATA[
      .bg         { fill: #0B0F14; }
      .rule       { stroke: #1F2A36; stroke-width: 1; fill: none; }
      .rule-dim   { stroke: #1F2A36; stroke-width: 1; stroke-dasharray: 2 4; fill: none; }
      .layer      { fill: none; stroke: #2A3A4C; stroke-width: 1; }
      .layer-lbl  { font: 600 10px ui-monospace, "SF Mono", Menlo, Monaco, monospace; fill: #5C6F83; letter-spacing: 0.22em; }
      .layer-sub  { font: 400 11px ui-monospace, "SF Mono", Menlo, Monaco, monospace; fill: #7A8B9F; letter-spacing: 0.02em; }

      .node       { fill: #121923; stroke: #2A3A4C; stroke-width: 1; }
      .node-hi    { fill: #121923; stroke: #38BDF8; stroke-width: 1.25; }
      .node-warn  { fill: #121923; stroke: #F59E0B; stroke-width: 1.25; }
      .node-core  { fill: #0E1620; stroke: #38BDF8; stroke-width: 1.5; }

      .title      { font: 700 28px ui-sans-serif, -apple-system, "Segoe UI", sans-serif; fill: #E6EDF3; letter-spacing: -0.01em; }
      .subtitle   { font: 400 12px ui-monospace, "SF Mono", Menlo, Monaco, monospace; fill: #7A8B9F; letter-spacing: 0.18em; }

      .node-title { font: 600 14px ui-sans-serif, -apple-system, "Segoe UI", sans-serif; fill: #E6EDF3; letter-spacing: 0; }
      .node-sub   { font: 400 11px ui-monospace, "SF Mono", Menlo, Monaco, monospace; fill: #9AABBF; }
      .node-mono  { font: 400 10.5px ui-monospace, "SF Mono", Menlo, Monaco, monospace; fill: #7A8B9F; letter-spacing: 0; }

      .arrow      { stroke: #5C6F83; stroke-width: 1.2; fill: none; }
      .arrow-pass { stroke: #38BDF8; stroke-width: 1.4; fill: none; }
      .arrow-block{ stroke: #EF4444; stroke-width: 1.4; fill: none; }
      .arrow-loop { stroke: #F59E0B; stroke-width: 1.3; fill: none; stroke-dasharray: 4 3; }
      .arrow-tel  { stroke: #10B981; stroke-width: 1.3; fill: none; stroke-dasharray: 2 3; }

      .edge-lbl   { font: 600 10px ui-monospace, "SF Mono", Menlo, Monaco, monospace; letter-spacing: 0.12em; }
      .edge-pass  { fill: #38BDF8; }
      .edge-block { fill: #EF4444; }
      .edge-loop  { fill: #F59E0B; }
      .edge-tel   { fill: #10B981; }

      .tick       { stroke: #2A3A4C; stroke-width: 0.75; }
      .tick-lbl   { font: 400 9px ui-monospace, "SF Mono", Menlo, Monaco, monospace; fill: #5C6F83; letter-spacing: 0.12em; }

      .meta       { font: 400 10px ui-monospace, "SF Mono", Menlo, Monaco, monospace; fill: #5C6F83; letter-spacing: 0.02em; }
    ]]></style>

    <marker id="arrow-head" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5C6F83"/>
    </marker>
    <marker id="arrow-head-pass" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38BDF8"/>
    </marker>
    <marker id="arrow-head-block" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#EF4444"/>
    </marker>
    <marker id="arrow-head-loop" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F59E0B"/>
    </marker>
    <marker id="arrow-head-tel" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10B981"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="780"/>

  <!-- Header -->
  <g transform="translate(60, 56)">
    <text class="subtitle" x="0" y="0">EPISTEME · CONTROL PLANE · v0.10.0</text>
    <text class="title" x="0" y="30">Sovereign Kernel — three-layer interposition</text>
    <text class="meta" x="0" y="52">agent runtime ── [ reasoning-surface guard · stateful interceptor · calibration telemetry ] ── hardware / os</text>
  </g>

  <!-- Corner ticks for the instrumentation feel -->
  <g class="tick">
    <line x1="40"   y1="40"  x2="52"  y2="40"/>
    <line x1="40"   y1="40"  x2="40"  y2="52"/>
    <line x1="1160" y1="40"  x2="1148" y2="40"/>
    <line x1="1160" y1="40"  x2="1160" y2="52"/>
    <line x1="40"   y1="740" x2="52"  y2="740"/>
    <line x1="40"   y1="740" x2="40"  y2="728"/>
    <line x1="1160" y1="740" x2="1148" y2="740"/>
    <line x1="1160" y1="740" x2="1160" y2="728"/>
  </g>

  <!-- ═══════════════ LAYER 1: AGENT RUNTIME ═══════════════ -->
  <g transform="translate(60, 150)">
    <rect class="layer" x="0" y="0" width="1080" height="100"/>
    <text class="layer-lbl" x="12" y="20">LAYER 1 · AGENT RUNTIME</text>
    <text class="layer-sub" x="12" y="38">Claude Code · Cursor · LangChain · CrewAI · MCP · any LLM surface</text>

    <!-- Nodes -->
    <g transform="translate(140, 52)">
      <rect class="node" x="0" y="0" width="200" height="36" rx="2"/>
      <text class="node-title" x="100" y="16" text-anchor="middle">LLM reasoning</text>
      <text class="node-mono"  x="100" y="29" text-anchor="middle">tokens → tool call intent</text>
    </g>
    <g transform="translate(440, 52)">
      <rect class="node" x="0" y="0" width="200" height="36" rx="2"/>
      <text class="node-title" x="100" y="16" text-anchor="middle">Tool dispatcher</text>
      <text class="node-mono"  x="100" y="29" text-anchor="middle">Bash · Write · Edit · MultiEdit</text>
    </g>
    <g transform="translate(740, 52)">
      <rect class="node" x="0" y="0" width="200" height="36" rx="2"/>
      <text class="node-title" x="100" y="16" text-anchor="middle">Tool-use envelope</text>
      <text class="node-mono"  x="100" y="29" text-anchor="middle">stdin JSON → PreToolUse hook</text>
    </g>
  </g>

  <!-- Down arrow: runtime → control plane -->
  <g>
    <path class="arrow" d="M 600 250 L 600 296" marker-end="url(#arrow-head)"/>
    <text class="edge-lbl" fill="#5C6F83" x="610" y="278">tool call</text>
  </g>

  <!-- ═══════════════ LAYER 2: EPISTEME CONTROL PLANE ═══════════════ -->
  <g transform="translate(60, 300)">
    <rect class="layer" x="0" y="0" width="1080" height="260" stroke="#38BDF8" stroke-width="1.25"/>
    <text class="layer-lbl" fill="#38BDF8" x="12" y="20">LAYER 2 · EPISTEME CONTROL PLANE</text>
    <text class="layer-sub" x="12" y="38">deterministic · markdown-first · local-only · vendor-neutral</text>

    <!-- Reasoning Surface Guard (core) -->
    <g transform="translate(60, 70)">
      <rect class="node-core" x="0" y="0" width="320" height="150" rx="3"/>
      <text class="node-title" x="160" y="22" text-anchor="middle">Reasoning-Surface Guard</text>
      <text class="node-sub"   x="160" y="40" text-anchor="middle" fill="#38BDF8">PreToolUse · STRICT default</text>

      <line class="rule-dim" x1="16" y1="56" x2="304" y2="56"/>

      <text class="node-mono" x="20" y="76">· Knowns / Unknowns</text>
      <text class="node-mono" x="20" y="92">· Assumptions</text>
      <text class="node-mono" x="20" y="108">· Disconfirmation (≥15 chars)</text>
      <text class="node-mono" x="20" y="124">· TTL 30 min · lazy-token blocklist</text>
      <text class="node-mono" x="20" y="140" fill="#38BDF8">→ PASS  |  → BLOCK (exit 2)</text>
    </g>

    <!-- Stateful Interceptor (new in v0.10) -->
    <g transform="translate(420, 70)">
      <rect class="node-warn" x="0" y="0" width="260" height="150" rx="3"/>
      <text class="node-title" x="130" y="22" text-anchor="middle">Stateful Interceptor</text>
      <text class="node-sub"   x="130" y="40" text-anchor="middle" fill="#F59E0B">PostToolUse + cross-call memory</text>

      <line class="rule-dim" x1="16" y1="56" x2="244" y2="56"/>

      <text class="node-mono" x="20" y="76">· Write/Edit → sha256 + ts</text>
      <text class="node-mono" x="20" y="92">· Bash redirects (&gt;, &gt;&gt;, tee)</text>
      <text class="node-mono" x="20" y="108">· TTL 24h · atomic replace</text>
      <text class="node-mono" x="20" y="124">· session_context.json</text>
      <text class="node-mono" x="20" y="140" fill="#F59E0B">→ deep-scan on execute</text>
    </g>

    <!-- Calibration Telemetry (new in v0.9) -->
    <g transform="translate(720, 70)">
      <rect class="node" x="0" y="0" width="300" height="150" rx="3" stroke="#10B981" stroke-width="1.25"/>
      <text class="node-title" x="150" y="22" text-anchor="middle">Calibration Telemetry</text>
      <text class="node-sub"   x="150" y="40" text-anchor="middle" fill="#10B981">prediction ⇄ outcome · JSONL</text>

      <line class="rule-dim" x1="16" y1="56" x2="284" y2="56"/>

      <text class="node-mono" x="20" y="76">· pre: disconfirmation + unknowns</text>
      <text class="node-mono" x="20" y="92">· post: exit_code, status</text>
      <text class="node-mono" x="20" y="108">· correlation_id = tool_use_id</text>
      <text class="node-mono" x="20" y="124">· YYYY-MM-DD-audit.jsonl</text>
      <text class="node-mono" x="20" y="140" fill="#10B981">→ `evolve friction` report</text>
    </g>

    <!-- Stateful interceptor loop arrow (amber, dashed) -->
    <path class="arrow-loop" d="M 550 70 C 550 24, 260 24, 260 70"
          marker-end="url(#arrow-head-loop)"/>
    <text class="edge-lbl edge-loop" x="340" y="16">stateful loop · cross-call memory</text>

    <!-- Telemetry feedback arrow to the guard (emerald, dashed) -->
    <path class="arrow-tel" d="M 720 156 L 380 156"
          marker-end="url(#arrow-head-tel)"/>
    <text class="edge-lbl edge-tel" x="480" y="150">telemetry · tunes disconfirmation</text>
  </g>

  <!-- PASS / BLOCK branch labels -->
  <g>
    <path class="arrow-pass" d="M 380 560 L 380 616" marker-end="url(#arrow-head-pass)"/>
    <text class="edge-lbl edge-pass" x="320" y="592">PASS · exit 0</text>

    <path class="arrow-block" d="M 820 560 L 820 616" marker-end="url(#arrow-head-block)"/>
    <text class="edge-lbl edge-block" x="835" y="592">BLOCK · exit 2</text>
  </g>

  <!-- ═══════════════ LAYER 3: HARDWARE / OS ═══════════════ -->
  <g transform="translate(60, 620)">
    <rect class="layer" x="0" y="0" width="1080" height="100"/>
    <text class="layer-lbl" x="12" y="20">LAYER 3 · HARDWARE · OPERATING SYSTEM</text>
    <text class="layer-sub" x="12" y="38">filesystem · process tree · network · git remote · cloud api</text>

    <!-- Nodes -->
    <g transform="translate(140, 52)">
      <rect class="node" x="0" y="0" width="200" height="36" rx="2"/>
      <text class="node-title" x="100" y="16" text-anchor="middle">Process</text>
      <text class="node-mono"  x="100" y="29" text-anchor="middle">fork · exec · fd</text>
    </g>
    <g transform="translate(440, 52)">
      <rect class="node" x="0" y="0" width="200" height="36" rx="2"/>
      <text class="node-title" x="100" y="16" text-anchor="middle">Persistent state</text>
      <text class="node-mono"  x="100" y="29" text-anchor="middle">fs · git tree · lockfile</text>
    </g>
    <g transform="translate(740, 52)">
      <rect class="node" x="0" y="0" width="200" height="36" rx="2"/>
      <text class="node-title" x="100" y="16" text-anchor="middle">Remote effect</text>
      <text class="node-mono"  x="100" y="29" text-anchor="middle">push · publish · deploy</text>
    </g>
  </g>

  <!-- Footer legend -->
  <g transform="translate(60, 744)">
    <text class="meta" x="0" y="0">
      <tspan fill="#38BDF8">■</tspan> pass / guard  ·
      <tspan fill="#F59E0B">■</tspan> stateful loop  ·
      <tspan fill="#10B981">■</tspan> telemetry  ·
      <tspan fill="#EF4444">■</tspan> block  ·  strict mode is default — advisory opt-in per-project.
    </text>
  </g>
</svg>
