<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1420" viewBox="0 0 1600 1420" role="img" aria-label="episteme — a portable cognitive kernel for AI agents. The kernel is markdown; adapters deliver it; the kernel is what travels. Current as of v0.10.0 with the stateful interceptor and calibration telemetry in the control plane.">

  <defs>
    <style type="text/css"><![CDATA[
      /* Editorial Constitution — typographic, no filled panels except the sync pill. */
      .nameplate    { font: 500 46px ui-serif, Georgia, "Times New Roman", serif; fill: #1A1612; letter-spacing: -0.015em; }
      .nameplate em { font-style: italic; font-weight: 400; }
      .epigraph     { font: 400 14px ui-sans-serif, -apple-system, "Segoe UI", "Helvetica Neue", sans-serif; fill: #5B4F42; letter-spacing: 0.04em; }
      .epigraph em  { font-style: italic; fill: #1A1612; }

      .rootclaim    { font: 500 40px ui-serif, Georgia, "Times New Roman", serif; fill: #1A1612; letter-spacing: -0.005em; }
      .rootclaim em { font-style: italic; font-weight: 500; fill: #7A2E2A; }
      .attribution  { font: 400 italic 13px ui-sans-serif, -apple-system, "Segoe UI", sans-serif; fill: #7A6A58; letter-spacing: 0.02em; }

      .section      { font: 600 11px ui-sans-serif, -apple-system, "Segoe UI", sans-serif; fill: #5B4F42; letter-spacing: 0.22em; }
      .section-hair { stroke: #2A231E; stroke-width: 0.75; stroke-opacity: 0.55; fill: none; }
      .hair         { stroke: #2A231E; stroke-width: 0.5; stroke-opacity: 0.30; fill: none; }
      .hair-row     { stroke: #2A231E; stroke-width: 0.5; stroke-opacity: 0.22; fill: none; }

      .roman        { font: 400 58px ui-serif, Georgia, "Times New Roman", serif; fill: #1A1612; letter-spacing: 0.02em; }
      .p-title      { font: 600 20px ui-serif, Georgia, "Times New Roman", serif; fill: #1A1612; letter-spacing: -0.005em; }
      .p-gloss      { font: 400 13px ui-sans-serif, -apple-system, "Segoe UI", sans-serif; fill: #5B4F42; letter-spacing: 0.005em; }
      .p-gloss em   { font-style: italic; fill: #1A1612; }

      .a-index      { font: 600 10px ui-sans-serif, -apple-system, "Segoe UI", sans-serif; fill: #7A6A58; letter-spacing: 0.22em; }
      .a-title      { font: 600 18px ui-serif, Georgia, "Times New Roman", serif; fill: #1A1612; letter-spacing: 0.005em; }
      .a-gloss      { font: 400 13px ui-sans-serif, -apple-system, "Segoe UI", sans-serif; fill: #5B4F42; letter-spacing: 0.01em; }
      .a-gloss em   { font-style: italic; fill: #1A1612; }
      .a-path       { font: 400 11px ui-monospace, "SF Mono", Menlo, Monaco, "Courier New", monospace; fill: #7A6A58; }

      .row-label    { font: 600 10px ui-sans-serif, -apple-system, "Segoe UI", sans-serif; fill: #7A6A58; letter-spacing: 0.22em; }
      .row-gloss    { font: 400 13px ui-sans-serif, -apple-system, "Segoe UI", sans-serif; fill: #5B4F42; }
      .row-path     { font: 400 11px ui-monospace, "SF Mono", Menlo, Monaco, "Courier New", monospace; fill: #7A6A58; }

      .sync-label   { font: 600 12.5px ui-monospace, "SF Mono", Menlo, Monaco, "Courier New", monospace; fill: #F5EFE2; letter-spacing: 0.08em; }

      .adapter      { font: 500 22px ui-serif, Georgia, "Times New Roman", serif; fill: #1A1612; letter-spacing: -0.005em; }
      .adapter-line { font: 400 12.5px ui-sans-serif, -apple-system, "Segoe UI", sans-serif; fill: #5B4F42; }
      .adapter-future .adapter { fill: #7A6A58; }
      .adapter-future .adapter-line { fill: #7A6A58; }

      .pack-heading { font: 400 italic 13px ui-serif, Georgia, "Times New Roman", serif; fill: #5B4F42; letter-spacing: 0.005em; }
      .pack-chip    { font: 500 12px ui-monospace, "SF Mono", Menlo, Monaco, "Courier New", monospace; fill: #5B4F42; letter-spacing: 0.02em; }
      .pack-chip em { font-style: italic; fill: #7A2E2A; }

      .colophon     { font: 400 12px ui-sans-serif, -apple-system, "Segoe UI", sans-serif; fill: #5B4F42; letter-spacing: 0.01em; }
      .colophon em  { font-style: italic; fill: #1A1612; }

      .accent-rule  { stroke: #7A2E2A; stroke-width: 2.25; fill: none; stroke-linecap: square; }
      .accent-thin  { stroke: #7A2E2A; stroke-width: 1.25; fill: none; }
      .ink-arrow    { stroke: #2A231E; stroke-width: 0.75; stroke-opacity: 0.55; fill: none; }

      .center { text-anchor: middle; }
      .end    { text-anchor: end; }
    ]]></style>

    <marker id="arrow-accent" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#7A2E2A"/>
    </marker>
    <marker id="arrow-ink" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2A231E" fill-opacity="0.55"/>
    </marker>
  </defs>

  <!-- Warm paper ground -->
  <rect width="1600" height="1380" fill="#F5EFE2"/>

  <!-- =========================================================
       MASTHEAD (y 40 – 120)
       ========================================================= -->
  <text x="80" y="82" class="nameplate">episteme</text>
  <text x="1520" y="62" class="epigraph end">A portable cognitive kernel for AI agents</text>
  <text x="1520" y="86" class="epigraph end">Markdown. Vendor-neutral. The kernel is what travels.</text>
  <line x1="80"  y1="112" x2="1520" y2="112" class="section-hair"/>
  <line x1="80"  y1="118" x2="1520" y2="118" class="hair"/>

  <!-- =========================================================
       ROOT CLAIM (y 160 – 310)
       ========================================================= -->
  <text x="800" y="220" class="rootclaim center">The danger is not incompetence.</text>
  <text x="800" y="270" class="rootclaim center">It is <tspan class="rootclaim" style="font-style:italic;fill:#7A2E2A">confident wrongness.</tspan></text>
  <line x1="700" y1="294" x2="900" y2="294" class="accent-rule"/>
  <text x="800" y="324" class="attribution center">— kernel / CONSTITUTION.md · the root claim from which every other artifact derives</text>

  <!-- =========================================================
       SECTION — THE FOUR PRINCIPLES (y 370 – 640)
       ========================================================= -->
  <text x="80"   y="378" class="section">THE FOUR PRINCIPLES  ·  I – IV  ·  Every design decision in the repository descends from these</text>
  <text x="1520" y="378" class="section end">PHILOSOPHY FIRST · IMPLEMENTATION FOLLOWS</text>
  <line x1="80" y1="392" x2="1520" y2="392" class="section-hair"/>

  <!-- Column I -->
  <text x="110" y="470" class="roman">I</text>
  <text x="110" y="510" class="p-title">Explicit &gt; implicit</text>
  <text x="110" y="548" class="p-gloss">Hidden assumptions are objectives</text>
  <text x="110" y="568" class="p-gloss">in disguise. Expose the model —</text>
  <text x="110" y="588" class="p-gloss">including the parts that are wrong.</text>
  <text x="110" y="618" class="p-gloss"><tspan style="font-style:italic">Counters: reasoning only from what is present.</tspan></text>

  <line x1="440" y1="430" x2="440" y2="630" class="hair"/>

  <!-- Column II -->
  <text x="470" y="470" class="roman">II</text>
  <text x="470" y="510" class="p-title">Orientation precedes observation</text>
  <text x="470" y="548" class="p-gloss">You never see reality; you see</text>
  <text x="470" y="568" class="p-gloss">your model of it. The kernel is</text>
  <text x="470" y="588" class="p-gloss">Orient infrastructure before Act.</text>
  <text x="470" y="618" class="p-gloss"><tspan style="font-style:italic">Counters: first-framing persistence.</tspan></text>

  <line x1="800" y1="430" x2="800" y2="630" class="hair"/>

  <!-- Column III -->
  <text x="830" y="470" class="roman">III</text>
  <text x="830" y="510" class="p-title">No model is sufficient alone</text>
  <text x="830" y="548" class="p-gloss">Every lens has a structural blind</text>
  <text x="830" y="568" class="p-gloss">spot. Convergence confirms;</text>
  <text x="830" y="588" class="p-gloss">conflict between lenses informs.</text>
  <text x="830" y="618" class="p-gloss"><tspan style="font-style:italic">Counters: story-fit over evidence.</tspan></text>

  <line x1="1160" y1="430" x2="1160" y2="630" class="hair"/>

  <!-- Column IV -->
  <text x="1190" y="470" class="roman">IV</text>
  <text x="1190" y="510" class="p-title">The loop is the unit of progress</text>
  <text x="1190" y="548" class="p-gloss">Understanding compounds through</text>
  <text x="1190" y="568" class="p-gloss">cycles with integrity. A skipped</text>
  <text x="1190" y="588" class="p-gloss">stage defers its cost, not removes it.</text>
  <text x="1190" y="618" class="p-gloss"><tspan style="font-style:italic">Counters: confidence exceeding accuracy.</tspan></text>

  <line x1="80" y1="660" x2="1520" y2="660" class="hair"/>

  <!-- =========================================================
       SECTION — KERNEL ARTIFACTS (y 700 – 920)
       ========================================================= -->
  <text x="80"   y="702" class="section">KERNEL ARTIFACTS  ·  Each counters a named failure mode · pure markdown · vendor-neutral</text>
  <text x="1520" y="702" class="section end">kernel /</text>
  <line x1="80" y1="716" x2="1520" y2="716" class="section-hair"/>

  <!-- Artifact row 01 -->
  <text x="110"  y="758" class="a-index">01</text>
  <text x="170"  y="758" class="a-title">Constitution</text>
  <text x="450"  y="758" class="a-gloss">Four principles. Philosophy before implementation; every other file descends from this one.</text>
  <text x="1520" y="758" class="a-path end">kernel/CONSTITUTION.md</text>
  <line x1="80" y1="778" x2="1520" y2="778" class="hair-row"/>

  <!-- Artifact row 02 -->
  <text x="110"  y="810" class="a-index">02</text>
  <text x="170"  y="810" class="a-title">Reasoning Surface</text>
  <text x="450"  y="810" class="a-gloss">Knowns · Unknowns · Assumptions · Disconfirmation — the minimum viable explicitness.</text>
  <text x="1520" y="810" class="a-path end">kernel/REASONING_SURFACE.md</text>
  <line x1="80" y1="830" x2="1520" y2="830" class="hair-row"/>

  <!-- Artifact row 03 -->
  <text x="110"  y="862" class="a-index">03</text>
  <text x="170"  y="862" class="a-title">Failure Modes</text>
  <text x="450"  y="862" class="a-gloss">Six named modes, each paired with the artifact that counters it. A named audit trail.</text>
  <text x="1520" y="862" class="a-path end">kernel/FAILURE_MODES.md</text>
  <line x1="80" y1="882" x2="1520" y2="882" class="hair-row"/>

  <!-- Artifact row 04 -->
  <text x="110"  y="914" class="a-index">04</text>
  <text x="170"  y="914" class="a-title">Operator Schema</text>
  <text x="450"  y="914" class="a-gloss">Workstyle and cognition, scored 0–3, portable across tools. Identity that travels.</text>
  <text x="1520" y="914" class="a-path end">kernel/OPERATOR_PROFILE_SCHEMA.md</text>
  <line x1="80" y1="934" x2="1520" y2="934" class="hair-row"/>

  <!-- Artifact row 05 -->
  <text x="110"  y="966" class="a-index">05</text>
  <text x="170"  y="966" class="a-title">Kernel Limits</text>
  <text x="450"  y="966" class="a-gloss">When this kernel is the wrong tool. A discipline without a declared boundary is a creed.</text>
  <text x="1520" y="966" class="a-path end">kernel/KERNEL_LIMITS.md</text>
  <line x1="80" y1="986" x2="1520" y2="986" class="hair-row"/>

  <!-- =========================================================
       SECTION — INSTANCE & DELIVERY (shifted +52)
       ========================================================= -->
  <text x="80"   y="1028" class="section">INSTANCE &amp; DELIVERY  ·  What the kernel attaches to, and how it travels</text>
  <text x="1520" y="1028" class="section end">authority : project truth › global operator › episodic</text>
  <line x1="80" y1="1042" x2="1520" y2="1042" class="section-hair"/>

  <!-- Instance row (two typographic columns, no boxes) — shifted +52 -->
  <text x="110" y="1080" class="row-label">OPERATOR INSTANCE</text>
  <text x="110" y="1106" class="row-gloss">The operator's cognitive posture, expressed as markdown.</text>
  <text x="110" y="1128" class="row-path">core/memory/global/ · operator_profile.md · cognitive_profile.md · workflow_policy.md</text>

  <line x1="780" y1="1062" x2="780" y2="1142" class="hair"/>

  <text x="810" y="1080" class="row-label">PROJECT TRUTH</text>
  <text x="810" y="1106" class="row-gloss">What this repository is building right now, and why.</text>
  <text x="810" y="1128" class="row-path">docs/ · REQUIREMENTS · PLAN · PROGRESS · NEXT_STEPS · RUN_CONTEXT · DECISION_STORY</text>

  <!-- Sync pill — shifted +52 -->
  <rect x="720" y="1160" width="160" height="34" rx="17" fill="#7A2E2A"/>
  <text x="800" y="1182" class="sync-label center">episteme sync</text>
  <line x1="800" y1="1198" x2="800" y2="1230" class="accent-thin" marker-end="url(#arrow-accent)"/>

  <!-- =========================================================
       DELIVERY — ADAPTERS (shifted +52)
       ========================================================= -->
  <line x1="80" y1="1242" x2="1520" y2="1242" class="hair"/>

  <!-- Claude Code -->
  <text x="110" y="1276" class="adapter">Claude Code</text>
  <text x="110" y="1300" class="adapter-line">CLAUDE.md index · deterministic safety hooks · personas &amp; skills</text>
  <text x="110" y="1320" class="row-path">adapters/claude</text>

  <line x1="430" y1="1252" x2="430" y2="1334" class="hair"/>

  <!-- Hermes -->
  <text x="460" y="1276" class="adapter">Hermes</text>
  <text x="460" y="1300" class="adapter-line">OPERATOR.md composite · SOUL.md identity · native skills</text>
  <text x="460" y="1320" class="row-path">adapters/hermes</text>

  <line x1="780" y1="1252" x2="780" y2="1334" class="hair"/>

  <!-- OMO / OMX -->
  <text x="810" y="1276" class="adapter">OMO / OMX</text>
  <text x="810" y="1300" class="adapter-line">agents &amp; skills bundle · shared governance · Claude-format settings</text>
  <text x="810" y="1320" class="row-path">core/adapters/*.json</text>

  <line x1="1160" y1="1252" x2="1160" y2="1334" class="hair"/>

  <!-- Future runtimes -->
  <g class="adapter-future">
    <text x="1190" y="1276" class="adapter"><tspan style="font-style:italic">Future runtimes</tspan></text>
    <text x="1190" y="1300" class="adapter-line">Codex · Cursor · opencode · MCP — same kernel, ~50-line shim each</text>
    <text x="1190" y="1320" class="row-path">drop a core/adapters/*.json</text>
  </g>

  <!-- =========================================================
       DOMAIN PACKS & DEMOS (shifted +52) — the positioning stratum
       ========================================================= -->
  <line x1="80" y1="1342" x2="1520" y2="1342" class="hair"/>
  <text x="80"  y="1362" class="pack-heading">Domain packs ride atop delivery · demos/ ship reference deliverables of the loop itself.</text>
  <text x="1520" y="1362" class="pack-chip end"><tspan style="font-style:italic">medsci-skills</tspan>  ·  ml-research  ·  web-app  ·  data-pipeline  ·  python-library  ·  <tspan style="font-style:italic">demos/</tspan></text>

  <!-- =========================================================
       CONTROL PLANE — v0.10.0 addendum (non-disruptive colophon band)
       ========================================================= -->
  <line x1="80" y1="1386" x2="1520" y2="1386" class="hair"/>
  <text x="80"  y="1406" class="colophon">Control plane · <em>Reasoning-Surface Guard</em>  ·  <em>Stateful Interceptor</em>  ·  <em>Calibration Telemetry</em>  —  see <tspan class="a-path">docs/assets/architecture_v2.svg</tspan> for the runtime schematic.</text>
  <text x="1520" y="1406" class="colophon end">v0.10.0 · The Sovereign Kernel</text>

</svg>
